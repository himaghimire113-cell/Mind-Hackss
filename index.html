<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Explorer — Dispatches from the Edge of the Universe</title>
<meta name="description" content="A blog of transmissions from deep space — stories, sightings, and signals.">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-N210L77JXK"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-N210L77JXK');
</script>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="space-bg" aria-hidden="true">
  <div class="stars stars--far"></div>
  <div class="stars stars--mid"></div>
  <div class="stars stars--near"></div>
  <div class="nebula nebula--cyan"></div>
  <div class="nebula nebula--purple"></div>
  <div class="shooting-star shooting-star--one"></div>
  <div class="shooting-star shooting-star--two"></div>
</div>

<header class="site-header">
  <a href="index.html" class="brand">
    <span class="brand-dot"></span>
    COSMIC <span>EXPLORER</span>
  </a>
  <a href="admin.html" class="nav-link">Admin</a>
</header>

<section class="hero">
  <p class="hero-eyebrow">Transmission Log</p>
  <h1>Dispatches from the<br>edge of the universe</h1>
  <p>Field notes, sightings, and stories from an ongoing journey through deep space.</p>

  <div class="orbit-system" aria-hidden="true">
    <div class="orbit-core"></div>
    <div class="orbit-ring orbit-ring--1"><div class="planet planet--cyan"></div></div>
    <div class="orbit-ring orbit-ring--2"><div class="planet planet--gold"></div></div>
    <div class="orbit-ring orbit-ring--3"><div class="planet planet--purple"></div></div>
  </div>
</section>

<main>
  <h2 class="section-label">Latest Transmissions</h2>
  <div class="post-grid" id="postGrid">
    <div class="loading-state">Scanning the galaxy for posts…</div>
  </div>
</main>

<footer>
  Broadcasting from somewhere past the asteroid belt · Cosmic Explorer
</footer>

<!-- Full post modal -->
<div class="modal-overlay" id="postModal">
  <div class="modal-box">
    <button class="modal-close" id="modalCloseBtn" aria-label="Close">✕</button>
    <h2 id="modalTitle"></h2>
    <span class="post-date" id="modalDate"></span>
    <div class="modal-media" id="modalMedia"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/appwrite@26.1.0"></script>
<script src="script.js"></script>
</body>
</html>
